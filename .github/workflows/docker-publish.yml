name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Strategy: build each platform on a native runner, push individual manifests
# by digest, then merge them into a single multi-arch manifest list.
# This avoids slow QEMU emulation for a source-compiled image like Janus.
#
# ARM64 runner note: `ubuntu-24.04-arm` is GitHub's standard native ARM64
# runner (free for public repos; requires Team/Enterprise for private repos).
# To switch to QEMU instead, replace `runner: ubuntu-24.04-arm` with
# `runner: ubuntu-latest` and add `DOCKER_BUILDKIT=1` in the build step.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            slug: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels only; final tags are applied in the merge job
      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # ── PR: build only, no push ────────────────────────────────────────────
      - name: Build (PR – validate only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,scope=${{ matrix.slug }},mode=max

      # ── Branch / tag: build and push by digest (no tag yet) ───────────────
      - name: Build and push by digest
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,scope=${{ matrix.slug }},mode=max

      # Store the digest in a tiny file named after it (consumed by merge job)
      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # Merge: combine per-arch digests into a single multi-arch manifest list.
  # Runs even when some matrix instances fail (partial multi-arch is better
  # than no publish at all) as long as at least one digest was produced.
  # ───────────────────────────────────────────────────────────────────────────
  merge:
    name: Merge manifests and publish
    runs-on: ubuntu-latest
    needs: build
    # Run on push/tag events. `always()` lets us proceed even if one arch
    # build failed; the manifest step will use whatever digests were uploaded.
    if: >-
      github.event_name != 'pull_request' &&
      always() &&
      contains(needs.build.result, 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download all digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch builds → :<branch>
            type=ref,event=branch
            # PR builds → :pr-<number>
            type=ref,event=pr
            # semver tag v1.2.3 → :1.2.3, :1.2, :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # exact commit SHA
            type=sha,format=long
            # :latest on the default branch only
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Collect all downloaded digests and create a manifest list with all tags
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
