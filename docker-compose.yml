services:
  janus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: janus-sip-bridge
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${JANUS_HTTP_PORT:-8088}:${JANUS_HTTP_PORT:-8088}/tcp"
      - "${JANUS_HTTPS_PORT:-8089}:${JANUS_HTTPS_PORT:-8089}/tcp"
      - "${JANUS_WS_PORT:-8188}:${JANUS_WS_PORT:-8188}/tcp"
      - "${JANUS_WSS_PORT:-8989}:${JANUS_WSS_PORT:-8989}/tcp"
      - "${SIP_LOCAL_PORT:-5060}:${SIP_LOCAL_PORT:-5060}/udp"
      - "${JANUS_RTP_MIN_PORT:-10000}-${JANUS_RTP_MAX_PORT:-20000}:${JANUS_RTP_MIN_PORT:-10000}-${JANUS_RTP_MAX_PORT:-20000}/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${JANUS_HTTP_PORT:-8088}${JANUS_HTTP_BASE_PATH:-/janus}/info >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
